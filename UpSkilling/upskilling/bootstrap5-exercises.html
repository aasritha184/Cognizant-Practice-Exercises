<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap 5 Exercises</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-3">

  <div class="row">
    <div class="col-md-3 bg-light border">Sidebar</div>
    <div class="col-md-9 border">Content</div>
  </div>

  <p class="display-6 mt-3">Display Heading</p>
  <p class="text-muted">Muted text</p>

  <form class="my-3">
    <input type="text" class="form-control mb-2" placeholder="Name">
    <div class="form-check">
      <input class="form-check-input" type="checkbox">
      <label class="form-check-label">Agree</label>
    </div>
  </form>

  <button class="btn btn-primary">Primary</button>
  <button class="btn btn-outline-secondary">Outline</button>

  <nav class="navbar navbar-light bg-light my-3">
    <span class="navbar-brand">Portal</span>
  </nav>

  <div class="card my-3" style="width: 16rem;">
    <div class="card-body">
      <h5 class="card-title">Event Card</h5>
      <p class="card-text">Some event info</p>
    </div>
  </div>

  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">Open Modal</button>
  <div class="modal fade" id="demoModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-body">Event details here</div>
      </div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
